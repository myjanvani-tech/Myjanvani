<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Janvani</title>

<style>

/* BODY */
body {
  margin: 0;
  font-family: system-ui, Arial, sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;

  /* Soft pattern background */
  background:
  radial-gradient(circle at 10% 20%, rgba(0,0,0,0.03) 2px, transparent 3px),
  linear-gradient(135deg,#f8f9fb,#eef2f7);
  background-size:120px 120px,cover;
}

/* HEADER */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  background: white;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}

/* Left profile */
.header-left img {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  object-fit: cover;
}

/* Center Title */
.header-center {
  font-size: 22px;
  font-weight: bold;
}

/* Right Buttons */
.header-right a {
  text-decoration: none;
  margin-left: 10px;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 14px;
  border: 1px solid #0077cc;
  color: #0077cc;
  transition: 0.3s;
}

.header-right a:hover {
  background: #0077cc;
  color: white;
}

/* CONTAINER */
.container {
  flex: 1;
  max-width: 750px;
  margin: 30px auto;
  padding: 15px;
}

/* ARTICLE CARD */
.article-item {
  background: white;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.05);
  transition: 0.3s;
}

.article-item:hover {
  transform: translateY(-3px);
}

/* AUTHOR */
.author {
  font-size: 14px;
  color: gray;
}

/* TITLE */
.article-title {
  font-size: 20px;
  font-weight: bold;
  margin: 5px 0;
}

.article-title a {
  text-decoration: none;
  color: black;
}

.article-title a:hover {
  color: #0077cc;
}

/* DATE */
.date {
  font-size: 13px;
  color: gray;
}

/* FIXED FOOTER */
footer {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #111;
  color: #ccc;
  text-align: center;
  padding: 12px;
  font-size: 14px;
}

footer a {
  color: #ccc;
  text-decoration: none;
  margin: 0 8px;
}

footer a:hover {
  color: white;
}

</style>
</head>

<body>

<header>

  <div class="header-left">
    <img src="/images/dinesh.jpg">
  </div>

  <div class="header-center">
    My Janvani
  </div>

  <div class="header-right">
    <a href="index.html">All Article</a>
    <a href="pages/about.html">About</a>
  </div>

</header>

<div class="container">
  <div id="articles-list"></div>
</div>

<footer>
  © 2026 My Janvani. All rights reserved.
  <br>
  <a href="pages/about.html">About</a> |
  <a href="pages/privacy.html">Privacy Policy</a> |
  <a href="pages/terms.html">Terms & Conditions</a>
</footer>

<script>

/* ARTICLES DATA */
const articles = [

{
  title: "क्या भारत में एक वर्ग विधि नियम कानून से ऊपर है..",
  author: "Dinesh Tiwari",
  date: "21 February 2026",
  link: "/articles/article1.html"
},

{
  title: "My Janvani Platform Launch",
  author: "Suraj Tiwari",
  date: "20 February 2026",
  link: "articles/article2.html"
}

];

let output = "";

articles.forEach(article => {

output += `
<div class="article-item">

<div class="author">
${article.author}
</div>

<div class="article-title">
<a href="${article.link}">
${article.title}
</a>
</div>

<div class="date">
${article.date}
</div>

</div>
`;

});

document.getElementById("articles-list").innerHTML = output;

</script>

</body>
</html>
