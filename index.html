<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Janvani</title>

<style>

/* BODY */
body {
  margin: 0;
  font-family: system-ui, Arial, sans-serif;
  background-color: #ffffff;
}

/* HEADER CENTER */
header {
  padding: 16px;
  border-bottom: 1px solid #e5e5e5;
}

.header-center {
  text-align: center;
  font-size: 22px;
  font-weight: bold;
}

/* CONTAINER */
.container {
  max-width: 700px;
  margin: auto;
  padding: 10px;
}

/* ARTICLE ITEM */
.article-item {
  padding: 18px 0;
  border-bottom: 1px solid #e5e5e5;
}

/* AUTHOR */
.author {
  font-size: 14px;
  color: gray;
}

/* TITLE */
.article-title {
  font-size: 20px;
  font-weight: bold;
  margin: 5px 0;
}

.article-title a {
  text-decoration: none;
  color: black;
}

.article-title a:hover {
  color: #0077cc;
}

/* DATE */
.date {
  font-size: 13px;
  color: gray;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  color: gray;
  font-size: 14px;
}

</style>

</head>
<body>

<header>
  <div class="header-center">
    My Janvani
  </div>
</header>

<div class="container">

  <div id="articles-list"></div>

</div>

<footer>
  © 2026 My Janvani
</footer>

<script>

/* ARTICLES DATA */
const articles = [

{
  title: "क्या भारत में एक वर्ग विधि नियम कानून से ऊपर है..",
  author: "Dinesh Tiwari",
  date: "21 February 2026",
  link: "articles/article1.html"
},

{
  title: "My Janvani Platform Launch",
  author: "Suraj Tiwari",
  date: "20 February 2026",
  link: "articles/article2.html"
}

];


/* LOAD ARTICLES */

let output = "";

articles.forEach(article => {

output += `

<div class="article-item">

<div class="author">
${article.author}
</div>

<div class="article-title">
<a href="${article.link}">
${article.title}
</a>
</div>

<div class="date">
${article.date}
</div>

</div>

`;

});

document.getElementById("articles-list").innerHTML = output;

</script>

</body>
</html>
