<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Janvani</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Main CSS -->
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <!-- Header -->
  <header>
    <div class="header-container">
      <div class="logo">My Janvani</div>
    </div>
  </header>

  <!-- Main Content -->
  <div class="container">

    <h1>Latest Articles</h1>

    <!-- Articles list yahan load hogi -->
    <div id="articles-list"></div>

  </div>

  <!-- Footer -->
  <footer>
    © 2026 My Janvani. All rights reserved.
  </footer>

  <!-- Script -->
  <script>
    fetch('articles.json')
      .then(response => response.json())
      .then(data => {

        let output = "";

        data.reverse().forEach(article => {

          output += `
            <div class="article-card">

              <h2>
                <a href="${article.file}">
                  ${article.title}
                </a>
              </h2>

              <div class="article-date">
                ${article.date} | ${article.author}
              </div>

            </div>
          `;

        });

        document.getElementById("articles-list").innerHTML = output;

      })
      .catch(error => {
        console.error("Error loading articles:", error);
      });
  </script>

</body>
</html>
